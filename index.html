<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldPass - Secure Password Manager</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="dark-theme">

    <!-- Toast Notification (Floating) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- ==================== LOGIN VIEW ==================== -->
    <div id="login-container" class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <div class="logo-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <h1 id="login-title">ShieldPass</h1>
                <p id="login-subtitle">Secure Zero-Knowledge Password Vault</p>
            </div>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username" id="label-username">Vault Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user input-icon"></i>
                        <input type="text" id="login-username" placeholder="Enter vault username" required autocomplete="username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="login-password" id="label-password">Master Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-key input-icon"></i>
                        <input type="password" id="login-password" placeholder="Enter master password" required autocomplete="current-password">
                        <button type="button" id="toggle-login-pass" class="btn-icon-inside">
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div id="login-error" class="alert alert-danger hidden">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                    <span id="login-error-msg">Invalid credentials.</span>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block" id="btn-login-submit">
                    <span>Unlock Vault</span>
                    <i class="fa-solid fa-unlock"></i>
                </button>
            </form>

            <div class="login-actions" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.06); text-align: center; font-size: 0.85rem; display: flex; flex-direction: column; gap: 12px;">
                <a href="#" id="link-import-vault" style="color: #6366f1; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 6px; font-weight: 500; transition: color 0.2s;">
                    <i class="fa-solid fa-file-import"></i>
                    <span>Import Encrypted Backup</span>
                </a>
                <input type="file" id="input-import-file" accept=".json" style="display: none;">
                
                <a href="#" id="link-reset-vault" class="hidden" style="color: var(--text-muted); text-decoration: none; font-size: 0.75rem; transition: color 0.2s;" onclick="if(confirm('CẢNH BÁO: Đặt lại két sắt sẽ xóa sạch tất cả tài khoản/mật khẩu đang lưu trên máy này. Bạn có chắc chắn muốn tiếp tục?')) { localStorage.clear(); sessionStorage.clear(); location.reload(); } return false;">
                    Reset Vault (Xóa sạch két sắt)
                </a>
            </div>
        </div>
    </div>

    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <!-- ==================== MAIN APPLICATION SHELL ==================== -->
    <div id="app-container" class="app-layout hidden">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="brand-logo">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <span class="brand-name">ShieldPass</span>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="#dashboard" class="nav-link active" id="nav-dashboard">
                            <i class="fa-solid fa-chart-pie"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="#accounts" class="nav-link" id="nav-accounts">
                            <i class="fa-solid fa-key"></i>
                            <span>Accounts</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer" style="display: flex; flex-direction: column; gap: 8px;">
                <div class="user-profile">
                    <div class="user-avatar">
                        <i class="fa-solid fa-user-shield"></i>
                    </div>
                    <div class="user-details">
                        <span class="user-name" id="user-display-name">Admin</span>
                        <span class="user-role">Vault Owner</span>
                    </div>
                </div>
                <button id="btn-export" class="btn btn-secondary btn-block" style="background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: center; align-items: center; gap: 8px; width: 100%; border-radius: 8px; padding: 8px 12px; font-size: 0.9rem; cursor: pointer; transition: background 0.2s;" title="Export Encrypted Backup">
                    <i class="fa-solid fa-file-export"></i>
                    <span>Backup Vault</span>
                </button>
                <button id="btn-logout" class="btn btn-logout" title="Sign Out">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span>Sign Out</span>
                </button>
            </div>
        </aside>

        <!-- Main Wrapper -->
        <div class="main-wrapper">
            <!-- Header -->
            <header class="app-header">
                <div class="header-left">
                    <button id="sidebar-toggle" class="sidebar-toggle-btn">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                    <h2 id="view-title">Dashboard</h2>
                </div>
                <div class="header-right">
                    <span class="status-indicator">
                        <span class="pulse-dot"></span>
                        <span>Secure Server Online</span>
                    </span>
                </div>
            </header>

            <!-- Main Content Container -->
            <main class="content-container">
                <div id="view-content" class="view-content-fade">
                    <!-- Dynamic views will be injected here -->
                </div>
            </main>
        </div>
    </div>

    <!-- ==================== ACCOUNT MODAL (ADD / EDIT) ==================== -->
    <div id="account-modal" class="modal-overlay hidden">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="modal-title">Add New Account</h3>
                <button type="button" class="modal-close" id="btn-modal-close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <form id="account-form">
                <input type="hidden" id="account-id">
                
                <div class="modal-body">
                    <div class="form-group">
                        <label for="acc-website">Website URL <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-globe input-icon"></i>
                            <input type="text" id="acc-website" placeholder="e.g. github.com" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group col">
                            <label for="acc-username">Username / Email <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-user-pen input-icon"></i>
                                <input type="text" id="acc-username" placeholder="Enter username or email" required>
                            </div>
                        </div>
                        <div class="form-group col">
                            <label for="acc-password">Password <span class="required">*</span></label>
                            <div class="input-wrapper">
                                <i class="fa-solid fa-key input-icon"></i>
                                <input type="password" id="acc-password" placeholder="Enter password" required>
                                <button type="button" id="toggle-acc-pass" class="btn-icon-inside" title="Show/Hide Password">
                                    <i class="fa-solid fa-eye"></i>
                                </button>
                                <button type="button" id="gen-acc-pass" class="btn-icon-inside" style="right: 40px;" title="Generate Secure Password">
                                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="acc-note">Notes</label>
                        <textarea id="acc-note" rows="3" placeholder="Add any notes here (e.g. recovery codes, answers to security questions)..."></textarea>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" id="btn-modal-cancel">Cancel</button>
                    <button type="submit" class="btn btn-primary" id="btn-modal-submit">
                        <i class="fa-solid fa-floppy-disk"></i>
                        <span>Save Account</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts Loading -->
    <script src="js/config.js"></script>
    <script src="js/services/api.js"></script>
    <script src="js/views/dashboard.js"></script>
    <script src="js/views/accounts.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
